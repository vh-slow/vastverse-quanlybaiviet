name: Build and deploy Node.js app to Azure Web App - vingochiep-2123110365

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        run: |
          npm install
          npm run build
        env:
          # Đảm bảo link API này là chính xác
          NEXT_PUBLIC_API_URL: "https://vingochiep-2123110365-vastverse.azurewebsites.net/api/"

      - name: Prepare standalone files
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # CHỈ UPLOAD cái này thôi, xóa cái bước upload "." bên dưới đi
          path: .next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BB997951C9D44559A16FD67445497B76 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_669C3423D5E34627A8ABA768AD2C6629 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_46BD3DF9E334466AA2B57BDB6564581F }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vingochiep-2123110365'
          slot-name: 'Production'
          package: .
